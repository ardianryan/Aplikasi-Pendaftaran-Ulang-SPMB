<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin - SPMB</title>
  <script src="/js/settings-loader.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#003f87',
            'on-primary': '#ffffff',
            'surface-tint': '#115cb9',
            tertiary: '#004d10',
            error: '#ba1a1a',
            background: '#f9f9fc',
            'surface-lowest': '#ffffff',
            'surface-low': '#f3f3f6',
            'on-surface': '#1a1c1e',
            'on-surface-variant': '#424752',
            outline: '#72787f',
            'outline-variant': '#c2c6d4',
          },
          fontFamily: {
            display: ['Lexend', 'sans-serif'],
            body: ['Public Sans', 'sans-serif'],
          },
        },
      },
    };
  </script>
</head>
<body class="bg-background font-body min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md px-6">
    <!-- Logo & Title -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-primary rounded-2xl mb-4">
        <span class="material-symbols-outlined text-on-primary text-3xl">school</span>
      </div>
      <h1 class="font-display text-2xl font-bold text-on-surface">Admin <span data-setting="app_name">SPMB</span></h1>
      <p class="text-on-surface-variant mt-1">Masuk ke panel administrasi</p>
    </div>

    <!-- Login Card -->
    <div class="bg-surface-lowest rounded-2xl shadow-sm border border-outline-variant p-8">
      <!-- Google Sign-In Button -->
      <button
        id="googleLoginBtn"
        onclick="loginWithGoogle()"
        class="w-full flex items-center justify-center gap-3 border border-outline-variant rounded-lg py-3 px-4 hover:bg-surface-container-low transition mb-6"
      >
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        <span class="text-sm font-medium text-on-surface">Masuk dengan Google</span>
      </button>

      <!-- Divider -->
      <div id="google-divider" class="flex items-center gap-3 mb-6">
        <div class="flex-1 h-px bg-outline-variant"></div>
        <span class="text-xs text-on-surface-variant">atau login manual</span>
        <div class="flex-1 h-px bg-outline-variant"></div>
      </div>

      <form id="loginForm" class="space-y-5">
        <!-- Username -->
        <div>
          <label for="username" class="block text-sm font-medium text-on-surface mb-1.5">Username</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-xl">person</span>
            <input
              type="text"
              id="username"
              name="username"
              required
              autocomplete="username"
              class="w-full pl-10 pr-4 py-2.5 border border-outline-variant rounded-lg bg-surface-lowest text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition"
              placeholder="Masukkan username"
            />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-sm font-medium text-on-surface mb-1.5">Password</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-xl">lock</span>
            <input
              type="password"
              id="password"
              name="password"
              required
              autocomplete="current-password"
              class="w-full pl-10 pr-10 py-2.5 border border-outline-variant rounded-lg bg-surface-lowest text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition"
              placeholder="Masukkan password"
            />
            <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition">
              <span class="material-symbols-outlined text-xl">visibility</span>
            </button>
          </div>
        </div>

        <!-- Error Message -->
        <div id="errorMsg" class="hidden text-sm text-error bg-error/10 border border-error/20 rounded-lg px-4 py-2.5"></div>

        <!-- Submit -->
        <button
          type="submit"
          id="submitBtn"
          class="w-full bg-primary text-on-primary font-medium py-2.5 rounded-lg hover:bg-primary/90 focus:ring-2 focus:ring-primary focus:ring-offset-2 transition flex items-center justify-center gap-2"
        >
          <span id="submitText">Masuk</span>
          <svg id="submitSpinner" class="hidden animate-spin h-5 w-5 text-on-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-outline mt-6">&copy; 2025 <span data-setting="school_name">SMAN 1 Gedeg</span></p>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (API.getToken() && localStorage.getItem('spmb_admin')) {
      window.location.href = '/admin/dashboard';
    }

    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');
    const submitText = document.getElementById('submitText');
    const submitSpinner = document.getElementById('submitSpinner');
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    // Toggle password visibility
    togglePassword.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      togglePassword.querySelector('span').textContent = isPassword ? 'visibility_off' : 'visibility';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.add('hidden');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        errorMsg.textContent = 'Username dan password harus diisi';
        errorMsg.classList.remove('hidden');
        return;
      }

      // Show loading
      submitBtn.disabled = true;
      submitText.textContent = 'Memproses...';
      submitSpinner.classList.remove('hidden');

      try {
        await API.adminLogin(username, password);
        window.location.href = '/admin/dashboard';
      } catch (err) {
        errorMsg.textContent = err.message || 'Login gagal. Periksa username dan password.';
        errorMsg.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitText.textContent = 'Masuk';
        submitSpinner.classList.add('hidden');
      }
    });

    // ============================================
    // Google Sign-In (using GIS library - popup mode)
    // ============================================

    let googleClientId = null;
    let gisInitialized = false;

    // Initialize GIS when library is loaded
    async function initGoogleSignIn() {
      try {
        const clientId = await getGoogleClientId();
        if (!clientId) {
          // Hide Google button if not configured
          document.getElementById('googleLoginBtn').style.display = 'none';
          document.getElementById('google-divider').style.display = 'none';
          return;
        }
        googleClientId = clientId;
        gisInitialized = true;
      } catch(e) {
        document.getElementById('googleLoginBtn').style.display = 'none';
        document.getElementById('google-divider').style.display = 'none';
      }
    }

    // State for referral flow
    let pendingGoogleData = null; // Stores credential+email when needs_referral

    async function loginWithGoogle() {
      if (!gisInitialized || !googleClientId) {
        showError('Google Sign-In belum siap. Muat ulang halaman.');
        return;
      }

      const googleBtn = document.getElementById('googleLoginBtn');
      googleBtn.disabled = true;
      errorMsg.classList.add('hidden');

      try {
        const tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: googleClientId,
          scope: 'openid email profile',
          callback: async (tokenResponse) => {
            if (tokenResponse.error) {
              showError('Login Google dibatalkan.');
              resetGoogleBtn();
              return;
            }

            try {
              // Get user info
              const userInfoRes = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                headers: { Authorization: `Bearer ${tokenResponse.access_token}` }
              });
              const userInfo = await userInfoRes.json();

              // Send to backend
              const res = await API.request('/auth/google', {
                method: 'POST',
                body: JSON.stringify({
                  credential: tokenResponse.access_token,
                  email: userInfo.email,
                  name: userInfo.name,
                  picture: userInfo.picture,
                }),
              });

              // Check response status
              if (res.data.status === 'authenticated') {
                // Direct login success
                API.setToken(res.data.token);
                localStorage.setItem('spmb_admin', JSON.stringify(res.data.admin));
                window.location.href = '/admin/dashboard';
              } else if (res.data.status === 'needs_referral') {
                // Need referral code — show referral input
                pendingGoogleData = {
                  credential: tokenResponse.access_token,
                  email: userInfo.email,
                  name: userInfo.name,
                  picture: userInfo.picture,
                };
                showReferralStep(res.data);
              }
            } catch (err) {
              showError(err.message || 'Login Google gagal.');
              resetGoogleBtn();
            }
          },
        });

        tokenClient.requestAccessToken({ prompt: 'select_account' });
      } catch (err) {
        showError('Gagal memulai login Google. Pastikan popup tidak diblokir.');
        resetGoogleBtn();
      }
    }

    // Show referral code input step
    function showReferralStep(data) {
      const card = document.querySelector('.bg-surface-lowest.rounded-2xl');
      card.innerHTML = `
        <div class="text-center mb-6">
          ${data.googlePicture ? `<img src="${data.googlePicture}" class="w-14 h-14 rounded-full mx-auto mb-3">` : ''}
          <p class="font-medium text-on-surface">${data.ssoName || data.googleName}</p>
          <p class="text-xs text-on-surface-variant">${data.googleEmail}</p>
          <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-primary/10 text-primary mt-2">${data.ssoRole || 'Guru/Tendik'}</span>
        </div>

        <div class="p-4 bg-surface-container-low rounded-lg mb-6">
          <div class="flex items-start gap-2">
            <span class="material-symbols-outlined text-primary mt-0.5" style="font-size:18px">info</span>
            <p class="text-sm text-on-surface-variant">Akun Anda ditemukan di SSO sekolah. Masukkan kode referral dari admin untuk mengaktifkan akses operator.</p>
          </div>
        </div>

        <div class="mb-4">
          <label for="referralInput" class="block text-sm font-bold text-on-surface mb-2">Kode Referral</label>
          <input type="text" id="referralInput" placeholder="Contoh: U240512005-1" class="w-full border border-outline-variant rounded-lg px-4 py-3 text-on-surface uppercase focus:ring-2 focus:ring-primary focus:border-primary">
          <p class="text-xs text-on-surface-variant mt-1">Format: PREFIX-NOMOR (dapatkan dari admin)</p>
        </div>

        <div id="referralError" class="hidden text-sm text-error bg-error-container/30 border border-error/20 rounded-lg px-4 py-2.5 mb-4"></div>

        <button onclick="submitReferral()" id="referralBtn" class="w-full bg-primary text-on-primary font-medium py-3 rounded-lg hover:bg-surface-tint transition flex items-center justify-center gap-2">
          <span class="material-symbols-outlined" style="font-size:18px">vpn_key</span>
          <span id="referralBtnText">Aktifkan Akun</span>
        </button>

        <button onclick="location.reload()" class="w-full mt-3 text-sm text-on-surface-variant hover:text-primary transition py-2">
          &larr; Gunakan akun Google lain
        </button>
      `;
    }

    // Submit referral code
    async function submitReferral() {
      const code = document.getElementById('referralInput').value.trim();
      const referralError = document.getElementById('referralError');
      const btn = document.getElementById('referralBtn');
      const btnText = document.getElementById('referralBtnText');

      referralError.classList.add('hidden');

      if (!code || !code.includes('-')) {
        referralError.textContent = 'Masukkan kode referral dengan format PREFIX-NOMOR';
        referralError.classList.remove('hidden');
        return;
      }

      if (!pendingGoogleData) {
        referralError.textContent = 'Sesi Google telah berakhir. Muat ulang halaman.';
        referralError.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btnText.textContent = 'Memproses...';

      try {
        const res = await API.request('/auth/activate-operator', {
          method: 'POST',
          body: JSON.stringify({
            referralCode: code.toUpperCase(),
            ...pendingGoogleData,
          }),
        });

        // Success — login
        API.setToken(res.data.token);
        localStorage.setItem('spmb_admin', JSON.stringify(res.data.admin));
        window.location.href = '/admin/dashboard';
      } catch (err) {
        referralError.textContent = err.message || 'Kode referral tidak valid.';
        referralError.classList.remove('hidden');
        btn.disabled = false;
        btnText.textContent = 'Aktifkan Akun';
      }
    }

    async function getGoogleClientId() {
      const res = await fetch('/api/auth/google/client-id');
      const json = await res.json();
      return json.data?.clientId || null;
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.remove('hidden');
    }

    function resetGoogleBtn() {
      const googleBtn = document.getElementById('googleLoginBtn');
      if (googleBtn) googleBtn.disabled = false;
    }

    // Init when GIS library loads
    window.onGISLoad = initGoogleSignIn;
  </script>
  <!-- Google Identity Services Library -->
  <script src="https://accounts.google.com/gsi/client" onload="window.onGISLoad && window.onGISLoad()"></script>
</body>
</html>
