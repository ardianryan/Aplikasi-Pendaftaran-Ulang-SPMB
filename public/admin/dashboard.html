<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Admin SPMB</title>
  <script src="/js/settings-loader.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#003f87',
            'on-primary': '#ffffff',
            'surface-tint': '#115cb9',
            tertiary: '#004d10',
            error: '#ba1a1a',
            background: '#f9f9fc',
            'surface-lowest': '#ffffff',
            'surface-low': '#f3f3f6',
            'on-surface': '#1a1c1e',
            'on-surface-variant': '#424752',
            outline: '#72787f',
            'outline-variant': '#c2c6d4',
          },
          fontFamily: {
            display: ['Lexend', 'sans-serif'],
            body: ['Public Sans', 'sans-serif'],
          },
        },
      },
    };
  </script>
</head>
<body class="bg-background font-body text-on-surface min-h-screen flex">
  <!-- Sidebar -->
  <nav class="hidden md:flex flex-col fixed top-0 left-0 w-64 h-screen bg-surface-container-lowest border-r border-outline-variant p-6 z-40">
    <div class="flex items-center gap-3 mb-8">
      <span class="material-symbols-outlined text-primary" style="font-size:32px">admin_panel_settings</span>
      <span class="font-display font-bold text-lg text-primary"><span data-setting="app_name">SPMB</span> Admin</span>
    </div>
    <ul class="space-y-1 flex-1">
      <li><a href="/admin/dashboard" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary/10 text-primary font-medium text-sm"><span class="material-symbols-outlined" style="font-size:20px">dashboard</span>Dashboard</a></li>
      <li><a href="/admin/students" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container-low transition text-sm"><span class="material-symbols-outlined" style="font-size:20px">groups</span>Data Siswa</a></li>
      <li><a href="/admin/verify" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container-low transition text-sm"><span class="material-symbols-outlined" style="font-size:20px">verified</span>Verifikasi</a></li>
      <li><a href="/admin/import" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container-low transition text-sm"><span class="material-symbols-outlined" style="font-size:20px">upload_file</span>Import Data</a></li>
      <li><a href="/admin/operators" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container-low transition text-sm"><span class="material-symbols-outlined" style="font-size:20px">manage_accounts</span>Operator</a></li>
      <li><a href="/admin/settings" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container-low transition text-sm"><span class="material-symbols-outlined" style="font-size:20px">settings</span>Pengaturan</a></li>
      <li><a href="/admin/profile" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container-low transition text-sm"><span class="material-symbols-outlined" style="font-size:20px">account_circle</span>Profil Saya</a></li>
    </ul>
    <button onclick="logout()" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-error hover:bg-error-container/30 transition text-sm mt-auto">
      <span class="material-symbols-outlined" style="font-size:20px">logout</span>Keluar
    </button>
  </nav>

  <!-- Main Content -->
  <div class="flex-1 md:ml-64">
    <!-- Top Bar -->
    <header class="sticky top-0 z-30 bg-surface-lowest/80 backdrop-blur-md border-b border-outline-variant">
      <div class="flex items-center justify-between px-6 py-3">
        <div>
          <h2 class="font-display font-semibold text-lg text-on-surface">Dashboard</h2>
          <p class="text-sm text-on-surface-variant">Ringkasan data pendaftaran</p>
        </div>
        <div class="flex items-center gap-3">
          <button class="relative p-2 text-on-surface-variant hover:bg-surface-low rounded-lg transition">
            <span class="material-symbols-outlined">notifications</span>
            <span id="notifBadge" class="hidden absolute top-1 right-1 w-2 h-2 bg-error rounded-full"></span>
          </button>
        </div>
      </div>
    </header>

    <!-- Content -->
    <main class="p-6">
      <!-- Stats Cards -->
      <div id="statsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <!-- Cards will be injected by JS -->
        <div class="bg-surface-lowest rounded-xl border border-outline-variant p-5 animate-pulse">
          <div class="h-4 bg-surface-low rounded w-24 mb-3"></div>
          <div class="h-8 bg-surface-low rounded w-16"></div>
        </div>
        <div class="bg-surface-lowest rounded-xl border border-outline-variant p-5 animate-pulse">
          <div class="h-4 bg-surface-low rounded w-24 mb-3"></div>
          <div class="h-8 bg-surface-low rounded w-16"></div>
        </div>
        <div class="bg-surface-lowest rounded-xl border border-outline-variant p-5 animate-pulse">
          <div class="h-4 bg-surface-low rounded w-24 mb-3"></div>
          <div class="h-8 bg-surface-low rounded w-16"></div>
        </div>
        <div class="bg-surface-lowest rounded-xl border border-outline-variant p-5 animate-pulse">
          <div class="h-4 bg-surface-low rounded w-24 mb-3"></div>
          <div class="h-8 bg-surface-low rounded w-16"></div>
        </div>
      </div>

      <!-- Two Column Layout -->
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- By Jalur -->
        <div class="lg:col-span-2 bg-surface-lowest rounded-xl border border-outline-variant">
          <div class="px-5 py-4 border-b border-outline-variant">
            <h3 class="font-display font-semibold text-on-surface">Pendaftar per Jalur</h3>
          </div>
          <div id="jalurList" class="p-5 space-y-3">
            <div class="animate-pulse space-y-3">
              <div class="h-10 bg-surface-low rounded"></div>
              <div class="h-10 bg-surface-low rounded"></div>
              <div class="h-10 bg-surface-low rounded"></div>
            </div>
          </div>
        </div>

        <!-- Verification Status -->
        <div class="bg-surface-lowest rounded-xl border border-outline-variant">
          <div class="px-5 py-4 border-b border-outline-variant">
            <h3 class="font-display font-semibold text-on-surface">Status Verifikasi</h3>
          </div>
          <div id="verificationStatus" class="p-5 space-y-4">
            <div class="animate-pulse space-y-4">
              <div class="h-12 bg-surface-low rounded"></div>
              <div class="h-12 bg-surface-low rounded"></div>
              <div class="h-12 bg-surface-low rounded"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/admin/role-guard.js"></script>
  <script src="/js/admin/dashboard.js"></script>
</body>
</html>
